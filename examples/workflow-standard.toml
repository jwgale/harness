# Example workflow: standard plan → build → evaluate with revision loop
# Copy to ~/.config/harness/workflows/
name = "standard"
description = "Standard plan-build-evaluate workflow with iterative revision"
max_rounds = 3

[[steps]]
agent = "my-planner"

[[steps]]
agent = "my-builder"
loop_until = "pass"
max_rounds = 3

[[steps]]
agent = "my-evaluator"
