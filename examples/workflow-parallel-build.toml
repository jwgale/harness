# Example workflow: parallel frontend + backend builds
# Copy to ~/.config/harness/workflows/
name = "parallel-build"
description = "Plan, then build frontend and backend in parallel, then evaluate"

[[steps]]
agent = "my-planner"

[[steps]]
agent = "@frontend"
requires = ["frontend"]
parallel = true

[[steps]]
agent = "@backend"
requires = ["backend"]
parallel = true

[[steps]]
agent = "my-evaluator"
