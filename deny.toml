[graph]
all-features = false
no-default-features = false
targets = []

[advisories]
unsound = "all"
ignore = [
    { id = "RUSTSEC-2024-0320", reason = "yaml-rust is pulled in transitively by syntect; no safe upstream replacement is available in the current dependency line." },
    { id = "RUSTSEC-2024-0384", reason = "instant is pulled in transitively by notify-types via notify; no direct project usage." },
    { id = "RUSTSEC-2024-0436", reason = "paste is pulled in transitively by ratatui; no direct project usage." },
    { id = "RUSTSEC-2025-0141", reason = "bincode is pulled in transitively by syntect; no direct project serialization usage." },
    { id = "RUSTSEC-2026-0002", reason = "lru is pulled in transitively by ratatui; Harness does not use lru IterMut directly." },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
